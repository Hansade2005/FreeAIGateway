<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      try {
        // Dark-first by brand: default to the hero dark theme; only an explicit
        // 'light' choice opts out. Set before paint to avoid a flash.
        const theme = localStorage.getItem('theme')
        document.documentElement.classList.add(theme === 'light' ? 'light' : 'dark')
      } catch {
        document.documentElement.classList.add('dark')
      }
    </script>
    <meta name="description" content="FreeAIGateway — one gateway, two protocols (OpenAI & Anthropic), sixteen free LLM providers behind a single endpoint." />
    <title>FreeAIGateway · One gateway, two protocols</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
