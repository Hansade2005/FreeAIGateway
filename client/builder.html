<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      try {
        const theme = localStorage.getItem('theme')
        document.documentElement.classList.add(theme === 'light' ? 'light' : 'dark')
      } catch {
        document.documentElement.classList.add('dark')
      }
    </script>
    <meta name="description" content="FreeAIGateway Builder — build web apps by prompting, powered by the free gateway." />
    <title>FreeAIGateway · Builder</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/builder/main.tsx"></script>
  </body>
</html>
