  <g fill="none" stroke="#fafafa" stroke-width="4" stroke-linecap="round">
    <path d="M14 22h12c4.4 0 8 3.6 8 8" opacity=".5"/>
    <path d="M14 42h12c4.4 0 8-3.6 8-8" opacity=".5"/>
    <path d="M36 32h16"/>
  </g>
  <circle cx="32" cy="32" r="8.5" fill="#5ce39a"/>
  <circle cx="32" cy="32" r="14" fill="none" stroke="#5ce39a" stroke-opacity=".4" stroke-width="3"/>
</svg>
