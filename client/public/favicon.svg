<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- FreeAIGateway mark: two protocol streams (OpenAI + Anthropic) enter from
       the left, converge through the signal node (the gateway), and exit
       unified on the right. -->
